name: Set Backblaze B2 CORS

on:
  workflow_dispatch:   # Run manually from the Actions tab — one time only

jobs:
  set-cors:
    runs-on: ubuntu-latest
    steps:
      - name: Install B2 CLI
        run: pip install b2

      - name: Authorise B2 account
        run: b2 authorize-account ${{ secrets.B2_APPLICATION_KEY_ID }} ${{ secrets.B2_APPLICATION_KEY }}

      - name: Write CORS rules file
        run: |
          cat > cors.json << 'EOF'
          [
            {
              "corsRuleName": "browser-put-get",
              "allowedOrigins": ["https://digiarch424.github.io"],
              "allowedOperations": ["b2_upload_file", "b2_upload_part", "b2_download_file_by_name", "b2_download_file_by_id"],
              "allowedHeaders": ["content-type", "authorization", "x-bz-file-name", "x-bz-content-sha1"],
              "exposeHeaders": ["x-bz-file-name", "x-bz-content-sha1"],
              "maxAgeSeconds": 3600
            }
          ]
          EOF

      - name: Apply CORS rules to bucket
        run: b2 update-bucket --corsRules "$(cat cors.json)" spatialrecon allPrivate

      - name: Verify
        run: b2 get-bucket spatialrecon
